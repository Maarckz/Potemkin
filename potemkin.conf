{
    "bind_address": "0.0.0.0",
    "socket_timeout": 1,
    "backlog": 32,
    "max_threads": 512,

    "detection": {
        "threshold": 10,
        "window": 60,
        "ban_duration": 600,
        "escalation": true,
        "max_ban_duration": 86400
    },

    "rate_limit": {
        "enabled": true,
        "max_connections": 80,
        "window": 10,
        "ban_on_exceed": true,
        "ban_duration": 300
    },

    "syslog": {
        "facility": "local6",
        "ident": "potemkin"
    },

    "firewall": {
        "backend": "iptables",
        "chain": "POTEMKIN",
        "helper": "/usr/local/bin/potemkin-firewall"
    },

    "whitelist": [],

    "log_level": "INFO",
    "log_file": "/var/log/potemkin/potemkin.log",
    "block_log": "/var/log/potemkin/blocked.log",
    "pid_file": "/var/run/potemkin/potemkin.pid"
}
